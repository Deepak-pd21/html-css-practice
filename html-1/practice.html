    <!--PRACTICE LISTING-->

    <h3>Cat Lists</h3>
    <div class="lists">
        <p>Things cat <strong>love</strong></p>

        <!--unordered list give dots or bullet-->
        <ul>
            <li>cat nip</li>
            <li>laser</li>
            <li>milk</li>
        </ul>
        <img src="https://supertails.com/cdn/shop/articles/cute-black-white-kitten-one-600nw-2367035583_600x.webp?v=1740656392" alt="milk">

        <p>Things cat <em>hate</em></p>
        <!--ordered list give numbers-->
        <ol>
            <li>cat nip</li>
            <li>laser</li>
            <li>milk</li>
        </ol>
    </div>

    <!--PRACTICE FORMS-->

    <form action="/submit">
        <label><input type="radio" name="inout">indoor</label>
        <label><input type="radio" name="inout">outdoor</label>
        <br>
        <label><input type="radio" checked>indoor</label>
        <label><input type="radio">outdoor</label><br>

        <label><input type="checkbox" >in</label><br>
        <label><input type="checkbox" >out</label><br>
        <label><input type="checkbox" checked>none</label><br>
         <!--checked marks that  thing permanently-->

        <label><input type="button">indoor</label><br>
        <label><input type="color">indoor</label><br>
        <label><input type="date" >indoor</label><br>
        <label><input type="datetime-local" >indoor</label><br>
        <label><input type="email" >indoor </label><br>
        <label><input type="file">indoor</label><br>
        <label><input type="image" > indoor</label><br>
        <label><input type="password" >indoor</label><br>
        <label><input type="range" >indoor</label><br>
        <label><input type="reset" >indoor</label><br>
        <label><input type="week" >indoor</label><br>

        <input type="text" placeholder="type here" required>
        <button type="submit">Submit</button>
    </form>
     
</body>
</html>
